<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32 Painel — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0d1117;font-family:sans-serif;color:#e8eaf0;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:#161b22;border:0.5px solid #30363d;border-radius:12px;padding:32px 28px;width:100%;max-width:360px;}
.logo{text-align:center;margin-bottom:24px;}
.logo-icon{width:48px;height:48px;border-radius:10px;background:#0d1117;border:1.5px solid #3fb950;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.logo-dot{width:18px;height:18px;border-radius:4px;background:#3fb950;box-shadow:0 0 10px #3fb950;}
.logo-title{font-size:18px;font-weight:600;color:#e8eaf0;}
.logo-sub{font-size:12px;color:#8b949e;margin-top:4px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:#8b949e;margin-bottom:6px;}
.field input{width:100%;padding:8px 12px;border-radius:8px;border:0.5px solid #30363d;background:#0d1117;color:#e8eaf0;font-size:14px;outline:none;transition:border .15s;}
.field input:focus{border-color:#58a6ff;}
.btn-login{width:100%;padding:10px;border-radius:8px;border:none;background:#238636;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:8px;}
.btn-login:hover{background:#2ea043;}
.error{font-size:12px;color:#e24b4a;text-align:center;margin-top:10px;display:none;}
.pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon"><div class="logo-dot pulse"></div></div>
      <div class="logo-title">ESP32 Painel</div>
     
    </div>
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="user" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" onclick="login()">Entrar</button>
    <div class="error" id="err">Usuário ou senha incorretos</div>
  </div>
</div>
<script>
// ── DEFINA SEU USUÁRIO E SENHA AQUI ──────────────────  /////////////////////////////////////////////////senhas
var USUARIO = "admin";
var SENHA   = "esp32";
// ─────────────────────────────────────────────────────

function login() {
  var u = document.getElementById('user').value.trim();
  var p = document.getElementById('pass').value;
  var err = document.getElementById('err');
  if (u === USUARIO && p === SENHA) {
    // Salva sessão por 8 horas
    var expira = Date.now() + 8 * 60 * 60 * 1000;
    sessionStorage.setItem('esp32auth', JSON.stringify({ok:true, expira:expira}));
    window.location.href = 'painel.html';
  } else {
    err.style.display = 'block';
    document.getElementById('pass').value = '';
    document.getElementById('pass').focus();
  }
}
</script>
</body>
</html>
