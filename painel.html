<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32 Painel</title>
<style>
html,body{margin:0;padding:0;background:#0d1117;color:#e8eaf0;font-family:sans-serif;font-size:14px;}
*{box-sizing:border-box;}
.wrap{padding:14px;max-width:1400px;}
/* CARDS */
.card{background:#161b22;border:0.5px solid #30363d;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.icard{background:#0d1117;border:0.5px solid #30363d;border-radius:8px;padding:10px 12px;margin-bottom:7px;transition:border .2s,box-shadow .2s;}
.icard.gon{border-color:#3fb950!important;box-shadow:0 0 10px #3fb95020;}
/* LAYOUT */
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.sh{font-size:10px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.lbl{font-size:11px;color:#8b949e;margin-bottom:3px;display:block;}
.col{display:flex;flex-direction:column;}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sep{height:0.5px;background:#21262d;margin:10px 0;}
/* METRICS */
.mbox{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.mt{background:#161b22;border:0.5px solid #30363d;border-radius:8px;padding:9px 12px;flex:1;min-width:65px;}
.ml{font-size:10px;color:#8b949e;margin-bottom:1px;}
.mv{font-size:17px;font-weight:500;}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:12px;background:#161b22;border-radius:8px;padding:4px;}
.tab{flex:1;font-size:12px;padding:6px 8px;border-radius:6px;border:none;background:transparent;color:#8b949e;cursor:pointer;text-align:center;outline:none;transition:all .15s;}
.tab.active{background:#21262d;color:#e8eaf0;}
.pane{display:none;}
.pane.active{display:block;}
/* BUTTONS */
.btn-g{padding:5px 14px;border-radius:6px;border:0.5px solid #3fb950;background:#0f2d1a;color:#7ee787;cursor:pointer;font-size:12px;font-weight:500;outline:none;transition:all .15s;}
.btn-g.on,.btn-g:hover{background:#3fb950;color:#0d1117;}
.btn-r{padding:5px 14px;border-radius:6px;border:0.5px solid #e24b4a;background:#3d1a1a;color:#ffa0a0;cursor:pointer;font-size:12px;font-weight:500;outline:none;transition:all .15s;}
.btn-r.on,.btn-r:hover{background:#e24b4a;color:#fff;}
.btn-b{padding:5px 14px;border-radius:6px;border:0.5px solid #58a6ff;background:#0d1f3c;color:#79c0ff;cursor:pointer;font-size:12px;outline:none;}
.btn-save{font-size:12px;font-weight:600;padding:6px 16px;border-radius:8px;border:none;background:#238636;color:#fff;cursor:pointer;outline:none;}
/* MISC */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pulse 1.5s infinite;}
.geral-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;}
.gcard{background:#0d1117;border:0.5px solid #30363d;border-radius:8px;padding:12px;text-align:center;}
.gcard.gon{border-color:#3fb950;box-shadow:0 0 10px #3fb95020;}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr" style="margin-bottom:12px;">
  <div>
    <div style="font-size:15px;font-weight:600;">Painel ESP32</div>
    <div style="font-size:11px;color:#8b949e;" id="hdr-base">---</div>
  </div>
  <div class="row">
    <div style="font-size:13px;font-weight:500;" id="clk-t">--:--:--</div>
    <div style="display:flex;align-items:center;gap:5px;">
      <span class="dot pulse" id="dot-broker" style="background:#8b949e;"></span>
      <span style="font-size:11px;color:#8b949e;" id="lbl-broker">broker</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;background:#161b22;border:0.5px solid #30363d;border-radius:6px;padding:3px 10px;">
      <span class="dot" id="dot-esp" style="background:#8b949e;"></span>
      <span style="font-size:11px;color:#8b949e;">ESP32</span>
      <span style="font-size:11px;font-weight:600;color:#8b949e;" id="lbl-esp">---</span>
    </div>
    <button class="btn-b" onclick="refreshPainel()">&#128260; Refresh</button>
    <button class="btn-save" onclick="salvarNuvem()">&#128190; Salvar</button>
  </div>
</div>

<div class="mbox">
  <div class="mt"><div class="ml">Coils</div><div class="mv" id="m-coils">0</div></div>
  <div class="mt"><div class="ml">Acionados</div><div class="mv" id="m-on" style="color:#3fb950;">0</div></div>
  <div class="mt"><div class="ml">Sensores</div><div class="mv" id="m-mon">0</div></div>
  <div class="mt"><div class="ml">Set Points</div><div class="mv" id="m-sp">0</div></div>
  <div class="mt"><div class="ml">SP Ativos</div><div class="mv" id="m-spac" style="color:#3fb950;">0</div></div>
</div>

<div class="tabs">
  <button class="tab" id="btn-geral" onclick="showTab('geral')">&#127968; Geral</button>
  <button class="tab active" id="btn-cfg" onclick="showTab('cfg')">&#9881; Config</button>
  <button class="tab" id="btn-coils" onclick="showTab('coils')">&#128268; Coils</button>
  <button class="tab" id="btn-mon" onclick="showTab('mon')">&#128202; Monitor</button>
  <button class="tab" id="btn-sp" onclick="showTab('sp')">&#127919; SPs</button>
</div>

<div class="pane" id="pane-geral">
  <div class="card">
    <div class="sh">dispositivo</div>
    <div class="geral-grid">
      <div class="gcard">
        <div style="font-size:10px;color:#8b949e;margin-bottom:6px;">ESP32</div>
        <div class="row" style="justify-content:center;gap:6px;">
          <span class="dot" id="g-dot-esp" style="background:#8b949e;"></span>
          <span style="font-size:18px;font-weight:700;" id="g-lbl-esp">---</span>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="sh">coils</div>
    <div class="geral-grid" id="g-coils"></div>
  </div>
  <div class="card">
    <div class="sh">sensores</div>
    <div class="geral-grid" id="g-mons"></div>
  </div>
</div>

<div class="pane active" id="pane-cfg">
  <div class="card">
    <div class="sh">identificacao</div>
    <div class="grid3">
      <div class="col"><label class="lbl">Projeto</label><input type="text" id="cfg-p" value="minha_casa" oninput="updateBase()"></div>
      <div class="col"><label class="lbl">Local</label><input type="text" id="cfg-l" value="sala" oninput="updateBase()"></div>
      <div class="col"><label class="lbl">Device ID</label><input type="text" id="cfg-d" value="esp32_01" oninput="updateBase()"></div>
    </div>
  </div>
  <div class="card">
    <div class="sh">conexao mqtt</div>
    <div class="row">
      <span id="mqtt-st" style="font-size:12px;font-weight:600;color:#e24b4a;">Desconectado</span>
      <button class="btn-b" onclick="conectarMQTT()">Conectar</button>
    </div>
  </div>
  <div class="card" style="border-color:#238636;">
    <div class="sh">nuvem</div>
    <span id="sync-st" style="font-size:11px;color:#8b949e;">pronto</span>
  </div>
</div>

<div class="pane" id="pane-coils">
  <div class="card">
    <div class="hdr"><div class="sh">coils</div><button class="btn-b" onclick="addCoil()">+ Coil</button></div>
    <div id="coils-list"></div>
  </div>
</div>

<div class="pane" id="pane-mon">
  <div class="card">
    <div class="hdr"><div class="sh">sensores</div><button class="btn-b" onclick="addMon('analog')">+ Analog</button></div>
    <div id="mon-list"></div>
  </div>
</div>

<div class="pane" id="pane-sp">
  <div class="card"><div id="sp-list"></div></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<script>
// JSONBIN CONFIG
var JSONBIN_KEY = '$2a$10$HPU0uDjSwrT7BpTdt1/as.vdnFGsC7BA/jKj6eMUVhDGykoclCotG';
var JSONBIN_ID = '69ee74c6856a68218976161c';
var JSONBIN_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_ID;

var coils = [], mons = [], sps = [], qty = 2;
var mqclient = null;
var _esp32Online = false;

// INICIALIZACAO
window.onload = function() { carregarNuvem(); setInterval(tick, 1000); tick(); };

function tick() { document.getElementById('clk-t').textContent = new Date().toLocaleTimeString('pt-BR'); }

function showTab(id) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('pane-'+id).classList.add('active');
    document.getElementById('btn-'+id).classList.add('active');
    if(id === 'geral') renderGeral();
}

// MQTT HIVEMQ
function conectarMQTT() {
    if (mqclient && mqclient.connected) return;
    document.getElementById('mqtt-st').textContent = 'Conectando...';
    
    mqclient = mqtt.connect('wss://4e5adb75a65d4a99839584edb12deeac.s1.eu.hivemq.cloud:8884/mqtt', {
        clientId: 'felipe_' + Math.random().toString(16).substr(2,4),
        username: 'joazeirofelipe',
        password: 'Mqtt@Railway2026',
        clean: true
    });

    mqclient.on('connect', () => {
        document.getElementById('mqtt-st').textContent = 'Conectado';
        document.getElementById('mqtt-st').style.color = '#3fb950';
        document.getElementById('dot-broker').style.background = '#3fb950';
        subscreverTopicos();
    });

    mqclient.on('message', (topic, msg) => processarMsg(topic, msg.toString()));
}

function subscreverTopicos() {
    if(!mqclient) return;
    mqclient.subscribe(getBase() + '/#');
}

function processarMsg(topic, msg) {
    var base = getBase();
    if(topic === base + '/status') setESP32Status(msg);
    
    // Estados Coils
    var cm = topic.match(/coil_(\d+)\/estado$/);
    if(cm) {
        var idx = parseInt(cm[1]) - 1;
        if(coils[idx]) {
            coils[idx].estado = (msg === coils[idx].msgA);
            renderCoils(); renderGeral(); updateMetrics();
        }
    }
}

function setESP32Status(s) {
    _esp32Online = (s === 'online');
    var cor = _esp32Online ? '#3fb950' : '#e24b4a';
    document.getElementById('dot-esp').style.background = cor;
    document.getElementById('lbl-esp').textContent = _esp32Online ? 'ONLINE' : 'OFFLINE';
    document.getElementById('g-dot-esp').style.background = cor;
    document.getElementById('g-lbl-esp').textContent = _esp32Online ? 'ONLINE' : 'OFFLINE';
}

function getBase() {
    return document.getElementById('cfg-p').value + '/' + document.getElementById('cfg-l').value + '/' + document.getElementById('cfg-d').value;
}

function updateBase() { document.getElementById('hdr-base').textContent = getBase(); }

function renderGeral() {
    var gc = document.getElementById('g-coils');
    gc.innerHTML = '';
    coils.forEach((c, i) => {
        gc.innerHTML += `<div class="gcard ${c.estado?'gon':''}">
            <div style="font-size:10px;color:#8b949e;">COIL ${i+1}</div>
            <div style="font-weight:600;">${c.nome}</div>
            <div style="color:${c.estado?'#3fb950':'#8b949e'}">${c.estado?'LIGADO':'DESLIGADO'}</div>
        </div>`;
    });
}

function updateMetrics() {
    document.getElementById('m-coils').textContent = coils.length;
    document.getElementById('m-on').textContent = coils.filter(c => c.estado).length;
}

// RE-ADICIONE AS FUNCOES DE ADD/REMOVE COIL E NUVEM AQUI...
</script>
</body>
</html>
